<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Organic Cursor Lab</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0b0d10;
        overflow: hidden;
        cursor: none;
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .overlay {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #c7d2e3;
        font-size: 13px;
        background: rgba(17, 20, 26, 0.65);
        border: 1px solid rgba(113, 133, 173, 0.4);
        border-radius: 10px;
        padding: 8px 10px;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="stats" class="overlay">Connecting...</div>
    <script src="./engine.js"></script>
  </body>
</html>
